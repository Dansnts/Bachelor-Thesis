apiVersion: batch/v1
kind: Job
metadata:
  name: sam3-ray-test
  namespace: dani
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      runtimeClassName: nvidia
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-secret
      hostIPC: true
      containers:
        - name: sam3-ray
          image: ghcr.io/nearai-interreg/ray-sam3:latest
          imagePullPolicy: Always
          command:
            - python3.12
            - /app/sam3_minio_pipeline.py
          args:
            - --local
            - --s3_uri
            - s3://nearai/data/acquisitions/Samples/01_images/
            - --s3_output_uri
            - s3://nearai/dani/test/predictions/
            - --labels
            - sign,road_marking
            - --batch_size
            - "2"
            - --num_workers
            - "1"
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access_key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret_key
            - name: S3_ENDPOINT_URL
              value: https://storage-kubernetes.iict-heig-vd.in:9000
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: HF_TOKEN
          resources:
            limits:
              nvidia.com/gpu: "1"
              cpu: "8"
              memory: 32Gi
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 16Gi
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
            - mountPath: /root/.cache/huggingface
              name: hf-cache
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.present
                    operator: In
                    values:
                      - "true"
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                      - NVIDIA-L40S
            - weight: 50
              preference:
                matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                      - NVIDIA-A40
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache
