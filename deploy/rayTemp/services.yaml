apiVersion: v1
kind: Service
metadata:
  name: ray-head-svc
  namespace: dani
spec:
  type: ClusterIP
  selector:
    app: ray-head
  ports:
    - name: gcs
      port: 6379
      targetPort: 6379
    - name: client
      port: 10001
      targetPort: 10001
    - name: dashboard
      port: 8265
      targetPort: 8265

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ray-dashboard-ingress
  namespace: dani
spec:
  rules:
    - host: ray-dashboard.iict-rad.iict-heig-vd.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ray-head-svc
                port:
                  number: 8265
