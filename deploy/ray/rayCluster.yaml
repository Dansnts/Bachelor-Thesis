apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: ray-cluster
  namespace: dani
spec:
  rayVersion: '2.44.1'

  headGroupSpec:
    rayStartParams:
      dashboard-host: '0.0.0.0'
    template:
      spec:
        imagePullSecrets:
          - name: ghcr-secret
        containers:
          - name: ray-head
            image: ghcr.io/nearai-interreg/ray-sam3:latest
            imagePullPolicy: Always
            ports:
              - containerPort: 6379   # Ray GCS
              - containerPort: 8265   # Dashboard
              - containerPort: 10001  # Ray client
            resources:
              limits:
                cpu: '2'
                memory: 4Gi
              requests:
                cpu: '2'
                memory: 4Gi

  workerGroupSpecs:
    - groupName: workers
      replicas: 3
      rayStartParams: {}
      template:
        spec:
          runtimeClassName: nvidia
          imagePullSecrets:
            - name: ghcr-secret
          containers:
            - name: ray-worker
              image: ghcr.io/nearai-interreg/ray-sam3:latest
              imagePullPolicy: Always
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: hf-secret
                      key: HF_TOKEN
              resources:
                limits:
                  nvidia.com/gpu: '1'
                  cpu: '8'
                  memory: 16Gi
                requests:
                  nvidia.com/gpu: '1'
                  cpu: '8'
                  memory: 16Gi
