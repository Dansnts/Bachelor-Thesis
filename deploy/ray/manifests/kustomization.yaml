apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# job-sam3-driver.yaml is intentionally excluded: it is an ephemeral batch Job
# launched on demand (and the API creates Jobs dynamically), not part of the
# standing deployment. Applying it here would start a batch run.
resources:
  - storageclass-rwx.yaml
  - cache-pvc.yaml
  - rayCluster.yaml
  - rayDashboard.yaml
  - ingress.yaml
