apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: ray-cluster
  namespace: dani
spec:
  rayVersion: "2.54.0"

  headGroupSpec:
    rayStartParams:
      dashboard-host: "0.0.0.0"
    template:
      metadata:
        labels:
          app: ray-head
      spec:
        securityContext:
          seccompProfile:
            type: RuntimeDefault
        imagePullSecrets:
          - name: ghcr-secret
        containers:
          - name: ray-head
            image: ghcr.io/nearai-interreg/ray-sam3:staging
            imagePullPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            ports:
              - containerPort: 6379 # Ray GCS
              - containerPort: 8265 # Dashboard
              - containerPort: 10001 # Ray client
            resources:
              limits:
                cpu: "2"
                memory: 4Gi
              requests:
                cpu: "2"
                memory: 4Gi

  workerGroupSpecs:
    - groupName: workers
      replicas: 3
      rayStartParams: {}
      template:
        metadata:
          labels:
            app: ray-worker
        spec:
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          runtimeClassName: nvidia
          affinity:
            nodeAffinity:
              # Hard-pin the GPU workers to suchet (L40S) and node4 (A40) only.
              # chasseron (L4) causes too many issues (weaker card, disk-pressure
              # evictions), so we exclude it entirely rather than merely
              # deprioritising it via the soft preference below.
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - iict-suchet
                          - iict-k8s-node4-rad
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: nvidia.com/gpu.product
                        operator: In
                        values:
                          - NVIDIA-L40S
                - weight: 50
                  preference:
                    matchExpressions:
                      - key: nvidia.com/gpu.product
                        operator: In
                        values:
                          - NVIDIA-A40
          imagePullSecrets:
            - name: ghcr-secret
          containers:
            - name: ray-worker
              image: ghcr.io/nearai-interreg/ray-sam3:staging
              imagePullPolicy: Always
              # root conservé (cache modèle), mais durci : pas d'escalade,
              # aucune capability. GPU via nvidia runtime (n'a pas besoin de caps).
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: hf-secret
                      key: HF_TOKEN
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: access_key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: secret_key
                - name: S3_ENDPOINT_URL
                  value: https://storage-kubernetes.iict-heig-vd.in:9000
              resources:
                limits:
                  nvidia.com/gpu: "1"
                  cpu: "8"
                  memory: 32Gi
                requests:
                  nvidia.com/gpu: "1"
                  cpu: "4"
                  memory: 16Gi
