apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: dani
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alloy
          # Tag épinglé (plus de :latest) : build reproductible. Aligner sur la
          # version réellement déployée / testée.
          image: grafana/alloy:v1.5.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
          ports:
            - containerPort: 12345
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
      volumes:
        - name: config
          configMap:
            name: alloy-config
