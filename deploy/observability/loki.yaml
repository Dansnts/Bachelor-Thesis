---
# ConfigMap : configuration Loki
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: dani
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
      replication_factor: 1
      path_prefix: /loki

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/index
        cache_location: /loki/cache
      aws:
        s3: http://${MINIO_ACCESS_KEY}:${MINIO_SECRET_KEY}@storage-kubernetes.iict-heig-vd.in:9000/nearai/dani/loki
        s3forcepathstyle: true
        region: ch

---
# Deployment Loki
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: dani
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.0.0
          args:
            - "-config.file=/etc/loki/loki.yaml"
            - "-config.expand-env=true"
          ports:
            - containerPort: 3100
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access_key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret_key
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: data
          emptyDir: {}

---
# Service Loki (utilisé par Promtail et Grafana)
apiVersion: v1
kind: Service
metadata:
  name: loki-svc
  namespace: dani
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
