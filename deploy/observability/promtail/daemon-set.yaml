# DaemonSet Promtail (1 pod par node)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: dani
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      initContainers:
        - name: increase-inotify-limits
          image: busybox
          command:
            [
              "sh",
              "-c",
              "sysctl -w fs.inotify.max_user_watches=524288 && sysctl -w fs.inotify.max_user_instances=512",
            ]
          securityContext:
            privileged: true
      containers:
        - name: promtail
          image: grafana/promtail:3.0.0
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: pods-logs
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: pods-logs
          hostPath:
            path: /var/log/pods # logs des pods sur le node host
