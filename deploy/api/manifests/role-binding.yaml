apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
# Donne les droits déinis dans le role.yaml au pod sam3-api
metadata:
  name: sam3-api
  namespace: dani
subjects:
  - kind: ServiceAccount
    name: sam3-api
    namespace: dani
roleRef:
  kind: Role
  name: sam3-api
  apiGroup: rbac.authorization.k8s.io
