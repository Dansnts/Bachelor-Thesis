apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sam3-api
  namespace: dani
rules:
  # Créer et suivre les Jobs solo / batch
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Lire les pods et leurs logs (récupérer la sortie d'un Job)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
